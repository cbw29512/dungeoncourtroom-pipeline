name: DungeonCourtroom RSS ingest (6h)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull RSS
        run: |
          python scripts/pull_rss.py

      - name: Commit state
        run: |
          if [[ -n "?? out/ ?? requirements.txt ?? scripts/ ?? state/" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/seen.json out/latest_case.json
            git commit -m "Ingest RSS update"
            git push
          else
            echo "No changes."
          fi
