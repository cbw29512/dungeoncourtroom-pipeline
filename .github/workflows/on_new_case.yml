name: On new DungeonCourtroom case

on:
  repository_dispatch:
    types: [dungeoncourtroom_new_case]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: newcase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save payload to inbox/latest_case.json
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os
          from pathlib import Path

          event_path = os.environ.get("GITHUB_EVENT_PATH")
          if not event_path:
              raise SystemExit("Missing GITHUB_EVENT_PATH")

          evt = json.loads(Path(event_path).read_text(encoding="utf-8"))

          # For repository_dispatch, payload is in client_payload.
          payload = evt.get("client_payload") or {}

          post_id = (payload.get("post_id") or "").strip()
          if not post_id:
              raise SystemExit("No post_id in client_payload (malformed dispatch payload)")

          out_dir = Path("inbox")
          out_dir.mkdir(parents=True, exist_ok=True)

          out_path = out_dir / "latest_case.json"
          out_path.write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          print(f"Wrote {out_path}")
          print(f"post_id={post_id}")
          print(f"title={payload.get('title','')}")
          PY

      - name: Run your generator (wire your real command here)
        shell: bash
        run: |
          set -euo pipefail
          echo "TODO: replace this with your real pipeline command"
          echo "Payload saved at inbox/latest_case.json"
          ls -la inbox

      - name: Upload payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest_case
          path: inbox/latest_case.json
