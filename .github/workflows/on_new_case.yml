name: On new DungeonCourtroom case

on:
  repository_dispatch:
    types: [dungeoncourtroom_new_case]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: newcase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save payload to inbox/latest_case.json
        shell: bash
        env:
          PIPELINE_LATEST_URL: https://raw.githubusercontent.com/cbw29512/dungeoncourtroom-pipeline/main/out/latest_case.json
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, urllib.request
          from pathlib import Path

          event_path = os.environ.get("GITHUB_EVENT_PATH")
          if not event_path:
              raise SystemExit("Missing GITHUB_EVENT_PATH")

          evt = json.loads(Path(event_path).read_text(encoding="utf-8"))
          payload = evt.get("client_payload")

          # If manually run (workflow_dispatch), there is no client_payload.
          # Fallback: fetch latest from the pipeline repo.
          if not payload:
              url = os.environ.get("PIPELINE_LATEST_URL", "").strip()
              if not url:
                  raise SystemExit("No client_payload and no PIPELINE_LATEST_URL set")
              with urllib.request.urlopen(url, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))

          post_id = (payload.get("post_id") or "").strip()
          if not post_id:
              raise SystemExit("No post_id in payload")

          out_dir = Path("inbox")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / "latest_case.json"
          out_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")

          print(f"Wrote {out_path}")
          print(f"post_id={post_id}")
          print(f"title={payload.get('title','')}")
          PY

      - name: Run your generator (wire your real command here)
        shell: bash
        run: |
          set -euo pipefail
          echo "TODO: replace this with your real pipeline command"
          ls -la inbox

      - name: Upload payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest_case
          path: inbox/latest_case.json
